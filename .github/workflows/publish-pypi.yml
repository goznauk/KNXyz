name: Publish PyPI

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish knxyz to PyPI
    runs-on: ubuntu-latest
    environment: release-pypi

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build tools
        run: python -m pip install --upgrade pip maturin

      - name: Build Python artifacts
        working-directory: bindings/python
        run: maturin build --sdist --wheel --release --out dist

      - name: Verify publish artifacts
        run: python tools/package/verify_publish_artifacts.py --python-dist bindings/python/dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: bindings/python/dist
