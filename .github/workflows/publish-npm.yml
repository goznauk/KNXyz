name: Publish npm

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    environment: release-npm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: bindings/node
        run: npm ci

      - name: Build native addon
        working-directory: bindings/node
        run: npm run build:native

      - name: Test
        working-directory: bindings/node
        run: npm test

      - name: Check pack contents
        working-directory: bindings/node
        run: npm pack --dry-run --json > /tmp/knxyz-npm-pack.json

      - name: Verify publish artifacts
        run: python3 tools/package/verify_publish_artifacts.py --node-pack-json /tmp/knxyz-npm-pack.json --node-package-json bindings/node/package.json

      - name: Publish
        working-directory: bindings/node
        run: npm publish --access public --provenance
